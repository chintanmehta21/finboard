name: Finboard — Weekly Backtest

on:
  schedule:
    # 16:30 UTC Friday = 10:00 PM IST Friday
    # Runs 1 hour after the daily pipeline on Friday to validate system performance.
    # India does not observe DST, so UTC+5:30 is fixed year-round.
    - cron: '30 16 * * 5'
  workflow_dispatch: # Manual trigger for testing

jobs:
  backtest:
    runs-on: ubuntu-latest
    timeout-minutes: 30  # Backtest is data-heavy, allow more time

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set cache date key
        run: echo "CACHE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Restore Fyers token cache
        uses: actions/cache@v4
        id: token-cache
        with:
          path: .token_cache/
          key: fyers-tokens-${{ env.CACHE_DATE }}
          restore-keys: fyers-tokens-

      - name: Run walk-forward backtest (52 weeks)
        env:
          FYERS_APP_ID:    ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET:    ${{ secrets.FYERS_SECRET_KEY }}
          FYERS_CLIENT_ID: ${{ secrets.FYERS_CLIENT_ID }}
          FYERS_PIN:       ${{ secrets.FYERS_PIN }}
          FYERS_TOTP_KEY:  ${{ secrets.FYERS_TOTP_KEY }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -m Tests.backtest.run_backtest --weeks 52

      - name: Save token cache for next run
        uses: actions/cache@v4
        with:
          path: .token_cache/
          key: fyers-tokens-${{ env.CACHE_DATE }}

      - name: Commit backtest results
        run: |
          git config user.name "Finboard Bot"
          git config user.email "bot@finboard.local"
          git add Tests/backtest/backtest_results/*.csv || true
          git diff --staged --quiet || git commit -m "chore: weekly backtest results $(date +'%Y-%m-%d')"
          git push || true

      - name: Upload backtest logs as artifact (14-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-log-${{ env.CACHE_DATE }}
          path: logs/backtest_*.log
          retention-days: 14

      - name: Upload backtest results as artifact (30-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ env.CACHE_DATE }}
          path: Tests/backtest/backtest_results/
          retention-days: 30

      - name: Notify on failure via Telegram
        if: failure()
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT:  ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          python -c "
          import requests, os
          token = os.environ.get('TELEGRAM_TOKEN', '')
          chat = os.environ.get('TELEGRAM_CHAT', '')
          if token and chat:
              msg = '⚠️ <b>Finboard — BACKTEST FAILED</b>\n\n'
              msg += 'The weekly backtest workflow failed.\n'
              msg += 'Check GitHub Actions logs for details.'
              try:
                  requests.post(
                      f'https://api.telegram.org/bot{token}/sendMessage',
                      json={'chat_id': chat, 'text': msg, 'parse_mode': 'HTML'},
                      timeout=10
                  )
              except Exception:
                  pass
          "

      - name: Notify on failure via Discord
        if: failure()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          python -c "
          import requests, os
          webhook = os.environ.get('DISCORD_WEBHOOK_URL', '')
          if webhook:
              msg = '⚠️ **Finboard — BACKTEST FAILED**\n\n'
              msg += 'The weekly backtest workflow failed.\n'
              msg += 'Check GitHub Actions logs for details.'
              try:
                  requests.post(webhook, json={'content': msg}, timeout=10)
              except Exception:
                  pass
          "
