name: Finboard — Daily Analysis

on:
  schedule:
    # 15:30 UTC = 9:00 PM IST — after market close (3:30 PM IST)
    # Analyzes today's trading data. Bhavcopy available ~4 PM, OHLCV by close.
    # India does not observe DST, so UTC+5:30 is fixed year-round.
    - cron: '30 15 * * 1-5'
  workflow_dispatch: # Manual trigger for testing

jobs:
  analyze:
    runs-on: ubuntu-latest
    timeout-minutes: 45  # Daily analysis ~29 min + buffer
    permissions:
      contents: write    # Required for committing signals.json back to repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Set cache date key (refreshes daily)
        run: echo "CACHE_DATE=$(date +'%Y-%m-%d')" >> $GITHUB_ENV

      - name: Restore Fyers token cache
        uses: actions/cache@v4
        id: token-cache
        with:
          path: .token_cache/
          key: fyers-tokens-${{ env.CACHE_DATE }}
          restore-keys: fyers-tokens-

      - name: Run full analysis pipeline
        env:
          FYERS_APP_ID:    ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET:    ${{ secrets.FYERS_SECRET_KEY }}
          FYERS_CLIENT_ID: ${{ secrets.FYERS_CLIENT_ID }}
          FYERS_PIN:       ${{ secrets.FYERS_PIN }}
          FYERS_TOTP_KEY:  ${{ secrets.FYERS_TOTP_KEY }}
          TELEGRAM_TOKEN:  ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT:   ${{ secrets.TELEGRAM_CHAT_ID }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          set +e
          python -m src.main
          EXIT_CODE=$?
          set -e
          if [ $EXIT_CODE -eq 2 ]; then
            # Exit 2 = market holiday. Python already sent the holiday message.
            # Mark as holiday so the commit step is skipped.
            echo "MARKET_HOLIDAY=true" >> $GITHUB_ENV
            echo "Market holiday detected — skipping dashboard update."
          elif [ $EXIT_CODE -ne 0 ]; then
            # Real failure. Python already sent the error notification.
            exit $EXIT_CODE
          fi

      - name: Save token cache for next run
        uses: actions/cache@v4
        with:
          path: .token_cache/
          key: fyers-tokens-${{ env.CACHE_DATE }}

      - name: Commit updated dashboard data
        if: env.MARKET_HOLIDAY != 'true'
        run: |
          git config user.name "Finboard Bot"
          git config user.email "bot@finboard.local"
          git add dashboard/public/data/signals.json || true
          git diff --staged --quiet || git commit -m "chore: update daily signals $(date +'%Y-%m-%d')"
          git pull --rebase origin main || true
          git push

      - name: Upload run log as artifact (7-day retention)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-log-${{ env.CACHE_DATE }}
          path: logs/
          retention-days: 7

      # NOTE: No workflow-level failure notifications here.
      # All notifications (success, holiday, error) are sent by Python (src/main.py)
      # to ensure exactly one message per run regardless of failure type.
