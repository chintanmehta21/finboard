name: Sync Secrets from Source Repo

on:
  workflow_dispatch:
    inputs:
      source_repo:
        description: "Source repo (owner/repo format)"
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: jpoehnelt/secrets-sync-action@v1.10.0
        with:
          secrets: |
            FYERS_APP_ID
            FYERS_SECRET_KEY
            FYERS_REDIRECT_URI
            FYERS_PIN
            DISCORD_BOT_TOKEN
            TELEGRAM_BOT_TOKEN
          repositories: |
            chintanmehta21/PivotPoint
          github_token: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        env:
          FYERS_APP_ID: ${{ secrets.FYERS_APP_ID }}
          FYERS_SECRET_KEY: ${{ secrets.FYERS_SECRET_KEY }}
          FYERS_REDIRECT_URI: ${{ secrets.FYERS_REDIRECT_URI }}
          FYERS_PIN: ${{ secrets.FYERS_PIN }}
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
